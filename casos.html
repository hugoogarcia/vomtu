<!-- CASES LIST: paginated, reads from admin localStorage -->
<section class="py-12 px-6" id="cases-section">

    <button id="btn-next" onclick="changePage(1)" class="flex items-center gap-2 px-6 py-3 rounded-full border border-white/20 text-white font-label font-black text-xs uppercase tracking-widest hover:border-primary/50 hover:bg-primary/10 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
      Siguiente <span class="material-symbols-outlined text-sm">arrow_forward</span>
    </button>

<script>
const CASES_PER_PAGE = 2;
const ACCENT_COLORS = ['bg-primary/20','bg-secondary/20','bg-emerald-500/20','bg-orange-500/20','bg-rose-500/20'];
const ACCENT_BADGES = ['SAAS','AGENCIA','PRODUCTO','MARCA','ECOMMERCE','ENGAGEMENT'];

const HARDCODED = [
  {name:'Velyn — SaaS',role:'SAAS',text:'Necesitábamos transmitir la esencia del producto de forma visual e impactante. El motion graphic capturó perfectamente el espíritu de la plataforma y nos dio un asset de lanzamiento brutal.',video:'roas/velyn.mp4',roas:''},
  {name:'Vortiza — Agencia IA',role:'AGENCIA DE IA',text:'Teníamos que comunicar nuestra propuesta de valor tecnológica de forma clara y atractiva. Este vídeo lo logró en segundos, captando la atención perfecta para nuestro público B2B.',video:'roas/vortiza.mp4',roas:''},
  {name:'Storytelling',role:'ENGAGEMENT & NARRATIVA',text:'Un ritmo de edición perfecto y una calidad visual que nos ayudó a destacar frente a toda la competencia. Directos al grano pero manteniendo al usuario enganchado.',video:'roas/storytelling.mp4',roas:''},
  {name:'Economy Laborathion',role:'PRODUCTO & MARCA',text:'El vídeo transmite exactamente la identidad de la marca. Calidad cinematográfica sin necesidad de cámaras ni equipo de producción. Listo en tiempo récord.',video:'roas/economy_laborathion_ad1_v2.mp4',roas:''},
  {name:'One Agency',role:'AGENCIA & SERVICIOS',text:'Queríamos un vídeo que representara la profesionalidad de nuestra agencia sin caer en lo genérico. El resultado fue un motion graphic con personalidad propia.',video:'roas/one-agency.mp4',roas:''},
];

let currentPage = 0;
let allCases = [];

function loadCases() {
  const db = JSON.parse(localStorage.getItem('vomtu_db') || '{"testimonials":[]}');
  const adminCases = (db.testimonials || []).map(t => ({name:t.name, role:t.role||'CLIENTE', text:t.text, video:t.video||'', roas:t.roas||''}));
  allCases = adminCases.length > 0 ? [...adminCases, ...HARDCODED] : HARDCODED;
  renderPage();
}

function renderPage() {
  const totalPages = Math.ceil(allCases.length / CASES_PER_PAGE);
  const start = currentPage * CASES_PER_PAGE;
  const items = allCases.slice(start, start + CASES_PER_PAGE);
  const container = document.getElementById('cases-container');
  container.innerHTML = items.map((c, i) => {
    const isEven = i % 2 === 0;
    const accent = ACCENT_COLORS[(start + i) % ACCENT_COLORS.length];
    const videoHtml = c.video ? `<div class="w-full md:w-1/3 aspect-[9/16] relative reveal-up"><div class="absolute inset-0 ${accent} blur-3xl rounded-full scale-75"></div><div class="relative z-10 h-full border border-white/10 rounded-[1.5rem] shadow-2xl overflow-hidden bg-neutral-900"><video src="${c.video}" controls playsinline class="w-full h-full object-cover"></video></div></div>` : '';
    const roasHtml = c.roas ? `<div class="inline-block mb-4 px-4 py-2 rounded-full bg-primary/10 border border-primary/20 text-primary font-label font-black text-xs uppercase tracking-widest">${c.roas}</div>` : '';
    const row = isEven ? `flex-col md:flex-row` : `flex-col md:flex-row-reverse`;
    return `<div class="flex ${row} gap-12 items-center">${videoHtml}<div class="w-full md:w-2/3 flex flex-col reveal-up" style="transition-delay:200ms"><div class="flex items-center gap-3 mb-4"><span class="text-xs font-label font-bold tracking-widest text-white/50 border border-white/10 rounded-full px-3 py-1 bg-white/5">${c.role}</span></div><h2 class="font-headline text-4xl font-black italic uppercase text-white mb-6">${c.name}</h2>${roasHtml}<div class="glass-panel p-8 rounded-2xl mb-8"><p class="text-white/90 text-lg leading-relaxed italic">"${c.text}"</p></div></div></div>`;
  }).join('');

  // Pagination controls
  const pg = document.getElementById('pagination');
  if (totalPages > 1) { pg.style.display = 'flex'; } else { pg.style.display = 'none'; }
  document.getElementById('page-indicator').textContent = `Pág ${currentPage+1} de ${totalPages}`;
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;

  // Re-observe animations
  document.querySelectorAll('.reveal-up').forEach(el => animationObserver.observe(el));
  window.scrollTo({top: document.getElementById('cases-section').offsetTop - 80, behavior:'smooth'});
}

function changePage(dir) { currentPage += dir; renderPage(); }
loadCases();
</script>

<script>
// Scroll Reveal Observer
const animationObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('active');
        }
    });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal-up').forEach(el => animationObserver.observe(el));

// Video autoplay
const videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.play().catch(e => console.log(e));
        } else {
            entry.target.pause();
        }
    });
}, { threshold: 0.5 });
document.querySelectorAll('video').forEach(video => videoObserver.observe(video));
</script>
